<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TS Productions | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Oswald', sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    h1 {
      margin: 30px 0;
    }

    .video-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    blockquote {
      width: 100%;
      height: 200px;
      border: none;
      border-radius: 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin: 20px;
      padding: 10px 20px;
      border: 2px solid #fff;
      color: #fff;
      text-decoration: none;
    }

  </style>
</head>

<body>

  <h1>TS Productions Portfolio</h1>

  <!-- YouTube Videos -->
  <div class="video-row">
    <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DVginK6kQsX/?igsh=MTkxemNrM2wyNWlnYQ==" data-instgrm-version="14"></blockquote>
    <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/C5rsuhWLvEF/?igsh=MXByb29maXl3MW11ZA==" data-instgrm-version="14"></blockquote>
    <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/Cn-ieJHujUG/?igsh=MTBnems2MG5oZnoxeQ==" data-instgrm-version="14"></blockquote>
  </div>

  <script async src="https://www.instagram.com/embed.js"></script>

  <!-- Photo Gallery -->
  <div class="gallery">
    <img src="sample1.jpg">
    <img src="sample2.jpg">
    <img src="sample3.jpg">
    <img src="sample4.jpg">
    <img src="sample5.jpg">
    <img src="sample6.jpg">
  </div>

  <a href="index.html" class="btn">Back to Home</a>

</body>
</html>
